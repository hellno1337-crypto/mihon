name: Build & Release NHentai Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android platform & build tools
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Pre-warm JitPack (extensions-lib)
        run: |
          # Trigger JitPack to build the artifact if not already cached
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://jitpack.io/com/github/mihonapp/extensions-lib/1.6.0-rc1/extensions-lib-1.6.0-rc1.pom")
          echo "JitPack status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Waiting for JitPack to build extensions-lib..."
            sleep 30
          fi

      - name: Generate placeholder icon
        run: |
          sudo apt-get install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48;;
              hdpi)    size=72;;
              xhdpi)   size=96;;
              xxhdpi)  size=144;;
              xxxhdpi) size=192;;
            esac
            mkdir -p src/en/nhentai/src/main/res/mipmap-${density}
            convert -size ${size}x${size} xc:'#1a1a2e' \
              -fill white -pointsize $((size/4)) -gravity Center \
              -annotate 0 "NH" \
              src/en/nhentai/src/main/res/mipmap-${density}/ic_launcher.png
          done

      - name: Build debug APK
        run: gradle :src:en:nhentai:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhentai-extension-apk
          path: src/en/nhentai/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Get version code
        id: version
        run: echo "code=$(grep extVersionCode src/en/nhentai/build.gradle | grep -oP '\d+')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.${{ steps.version.outputs.code }}
          name: "NHentai Extension v1.4.${{ steps.version.outputs.code }}"
          body: |
            ## NHentai Mihon Extension

            ### Install on Android
            1. Download the APK below
            2. Open it on your phone and tap Install
            3. Open Mihon → Settings → Browse → enable **Show NSFW sources**
            4. Browse → Extensions → NHentai
          files: src/en/nhentai/build/outputs/apk/debug/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
