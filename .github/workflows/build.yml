name: Build & Release NHentai Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android platform & build tools
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Pre-warm JitPack (extensions-lib)
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://jitpack.io/com/github/mihonapp/extensions-lib/1.6.0-rc1/extensions-lib-1.6.0-rc1.pom")
          echo "JitPack status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            sleep 30
          fi

      - name: Generate placeholder icon
        run: |
          sudo apt-get install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48;;
              hdpi)    size=72;;
              xhdpi)   size=96;;
              xxhdpi)  size=144;;
              xxxhdpi) size=192;;
            esac
            mkdir -p src/en/nhentai/src/main/res/mipmap-${density}
            convert -size ${size}x${size} xc:'#1a1a2e' \
              -fill white -pointsize $((size/4)) -gravity Center \
              -annotate 0 "NH" \
              src/en/nhentai/src/main/res/mipmap-${density}/ic_launcher.png
          done

      - name: Build debug APK
        run: gradle :src:en:nhentai:assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p repo
          cp src/en/nhentai/build/outputs/apk/debug/*.apk \
             repo/tachiyomi-en.nhentai-v1.4.1.apk

      - name: Generate index.min.json
        run: |
          cat > repo/index.min.json << 'EOF'
          [
            {
              "name": "NHentai",
              "pkg": "eu.kanade.tachiyomi.extension.en.nhentai",
              "apk": "tachiyomi-en.nhentai-v1.4.1.apk",
              "lang": "en",
              "code": 1,
              "version": "1.4.1",
              "nsfw": 1,
              "sources": [
                {
                  "name": "NHentai",
                  "lang": "en",
                  "id": 2027447278861166336,
                  "baseUrl": "https://nhentai.net",
                  "versionId": 1
                }
              ]
            }
          ]
          EOF
          # Remove leading whitespace
          sed -i 's/^[[:space:]]*//' repo/index.min.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhentai-extension-apk
          path: repo/tachiyomi-en.nhentai-v1.4.1.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.1
          name: "NHentai Extension v1.4.1"
          body: |
            ## NHentai Mihon Extension

            ### Easy install via Mihon repo URL
            1. Open Mihon → Settings → Browse → Extension repos
            2. Add: `https://hellno1337-crypto.github.io/mihon`
            3. Browse → Extensions → find NHentai → Install

            ### Or direct APK install
            Download the APK below and open it on your phone.

            > Enable NSFW sources: Mihon → Settings → Browse → Show NSFW sources
          files: repo/tachiyomi-en.nhentai-v1.4.1.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
