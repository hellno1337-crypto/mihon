name: Build & Release NHentai Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android platform & build tools
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Pre-warm JitPack (extensions-lib)
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
            "https://jitpack.io/com/github/keiyoushi/extensions-lib/d81081f0f4/extensions-lib-d81081f0f4.pom")
          echo "JitPack status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            sleep 30
          fi

      - name: Generate placeholder icon
        run: |
          sudo apt-get install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              mdpi)    size=48;;
              hdpi)    size=72;;
              xhdpi)   size=96;;
              xxhdpi)  size=144;;
              xxxhdpi) size=192;;
            esac
            mkdir -p src/en/nhentai/src/main/res/mipmap-${density}
            convert -size ${size}x${size} xc:'#1a1a2e' \
              -fill white -pointsize $((size/4)) -gravity Center \
              -annotate 0 "NH" \
              src/en/nhentai/src/main/res/mipmap-${density}/ic_launcher.png
          done

      - name: Restore signing keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: signing/nhentai.keystore
          key: nhentai-signing-keystore-stable-v1

      - name: Generate signing keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p signing
          keytool -genkey -v \
            -keystore signing/nhentai.keystore \
            -alias nhentai \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass android -keypass android \
            -dname "CN=NHentai Extension, O=Android, C=US"

      - name: Build release APK
        env:
          KEYSTORE_PATH: signing/nhentai.keystore
          KEYSTORE_PASS: android
          KEY_ALIAS: nhentai
          KEY_PASS: android
        run: gradle :src:en:nhentai:assembleRelease --stacktrace

      - name: Rename APK and extract signing fingerprint
        run: |
          mkdir -p repo/apk repo/icon
          cp src/en/nhentai/build/outputs/apk/release/*.apk \
             repo/apk/tachiyomi-en.nhentai-v1.4.1.apk
          FINGERPRINT=$($ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner verify \
            --print-certs repo/apk/tachiyomi-en.nhentai-v1.4.1.apk \
            | grep "SHA-256" | head -1 | awk '{print $NF}' | tr -d ':')
          echo "APK fingerprint: $FINGERPRINT"
          echo "FINGERPRINT=$FINGERPRINT" >> $GITHUB_ENV

      - name: Generate repo.json and index.min.json
        run: |
          # repo.json — required by Mihon to validate the repo
          cat > repo/repo.json << EOF
          {"meta":{"name":"Mihon Extensions","shortName":"Mihon","website":"https://hellno1337-crypto.github.io/mihon","signingKeyFingerprint":"$FINGERPRINT"}}
          EOF
          sed -i 's/^[[:space:]]*//' repo/repo.json

          # index.min.json — extension list
          cat > repo/index.min.json << 'EOF'
          [{"name":"NHentai","pkg":"eu.kanade.tachiyomi.extension.en.nhentai","apk":"tachiyomi-en.nhentai-v1.4.1.apk","lang":"en","code":1,"version":"1.4.1","nsfw":1,"sources":[{"name":"NHentai","lang":"en","id":2027447278861166336,"baseUrl":"https://nhentai.net","versionId":1}]}]
          EOF
          sed -i 's/^[[:space:]]*//' repo/index.min.json

          echo "repo.json:"
          cat repo/repo.json
          echo "index.min.json:"
          cat repo/index.min.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nhentai-extension-apk
          path: repo/apk/tachiyomi-en.nhentai-v1.4.1.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.1
          name: "NHentai Extension v1.4.1"
          body: |
            ## NHentai Mihon Extension

            ### Easy install via Mihon repo URL
            1. Open Mihon → Settings → Browse → Extension repos
            2. Add: `https://hellno1337-crypto.github.io/mihon`
            3. Browse → Extensions → find NHentai → Install

            ### Or direct APK install
            Download the APK below and open it on your phone.

            > Enable NSFW sources: Mihon → Settings → Browse → Show NSFW sources
          files: repo/apk/tachiyomi-en.nhentai-v1.4.1.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
